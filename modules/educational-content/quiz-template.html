<!-- QUIZ TEMPLATE - Add this section to the end of each module's <main> -->

<section id="quiz" class="scroll-mt-10 mt-24 pt-16 border-t border-slate-200">
    <div class="max-w-4xl">
        <h2 class="text-3xl font-bold font-display text-slate-900 mb-2">Test Your Knowledge</h2>
        <p class="text-slate-600 mb-8">Take this quiz to verify you've grasped the key concepts. You can retake it as many times as you want.</p>

        <div id="quiz-container" class="space-y-6">
            <!-- Quiz questions will be inserted here by JavaScript -->
        </div>

        <div id="quiz-results" class="hidden mt-8 p-8 bg-gradient-to-r from-indigo-50 to-blue-50 rounded-2xl border-2 border-indigo-200">
            <h3 class="text-2xl font-bold text-slate-900 mb-4">Quiz Results</h3>
            <div class="flex items-baseline gap-2 mb-6">
                <span class="text-5xl font-extrabold text-indigo-600" id="score-percentage">0%</span>
                <span class="text-lg text-slate-600">correct</span>
            </div>
            <p class="text-slate-700 mb-6" id="score-message"></p>
            <button onclick="location.reload()" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition-colors">
                Retake Quiz
            </button>
        </div>
    </div>
</section>

<style>
    .quiz-question {
        background: white;
        border: 2px solid #e2e8f0;
        border-radius: 1rem;
        padding: 1.5rem;
        transition: all 0.3s ease;
    }
    .quiz-question.answered {
        border-color: #4f46e5;
        background: #f1f5f9;
    }
    .quiz-question h3 {
        font-size: 1.125rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 1rem;
    }
    .quiz-option {
        display: flex;
        align-items: start;
        gap: 0.75rem;
        padding: 0.75rem;
        margin: 0.5rem 0;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .quiz-option:hover {
        background-color: #f1f5f9;
    }
    .quiz-option input[type="radio"] {
        margin-top: 0.25rem;
        cursor: pointer;
    }
    .quiz-option label {
        cursor: pointer;
        flex: 1;
    }
    .quiz-feedback {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 0.5rem;
        display: none;
    }
    .quiz-feedback.show {
        display: block;
    }
    .correct {
        background-color: #d1fae5;
        border-left: 4px solid #10b981;
        color: #065f46;
    }
    .incorrect {
        background-color: #fee2e2;
        border-left: 4px solid #ef4444;
        color: #7f1d1d;
    }
    .submit-btn {
        background-color: #4f46e5;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.2s ease;
        margin-top: 1rem;
    }
    .submit-btn:hover {
        background-color: #4338ca;
    }
    .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
</style>

<script>
// Quiz data - customize per module
const QUIZ_DATA = {
    title: "Module Quiz",
    questions: [
        {
            question: "Sample question 1?",
            options: ["Option A", "Option B", "Option C", "Option D"],
            correct: 0,
            explanation: "Explanation for why A is correct..."
        },
        {
            question: "Sample question 2?",
            options: ["Option A", "Option B", "Option C", "Option D"],
            correct: 1,
            explanation: "Explanation for why B is correct..."
        }
    ]
};

function initQuiz() {
    const container = document.getElementById('quiz-container');

    QUIZ_DATA.questions.forEach((q, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'quiz-question';
        questionDiv.id = `q${index}`;

        let optionsHtml = '';
        q.options.forEach((opt, optIndex) => {
            optionsHtml += `
                <label class="quiz-option">
                    <input type="radio" name="q${index}" value="${optIndex}" onchange="checkAnswer(${index}, ${optIndex})">
                    <span>${opt}</span>
                </label>
            `;
        });

        questionDiv.innerHTML = `
            <h3>${index + 1}. ${q.question}</h3>
            <div>${optionsHtml}</div>
            <div id="feedback${index}" class="quiz-feedback"></div>
        `;

        container.appendChild(questionDiv);
    });

    // Add submit button
    const submitBtn = document.createElement('button');
    submitBtn.className = 'submit-btn';
    submitBtn.textContent = 'Submit Quiz';
    submitBtn.onclick = submitQuiz;
    container.appendChild(submitBtn);
}

function checkAnswer(questionIndex, selectedIndex) {
    const correct = QUIZ_DATA.questions[questionIndex].correct;
    const feedback = document.getElementById(`feedback${questionIndex}`);
    const question = document.getElementById(`q${questionIndex}`);

    let feedbackClass = selectedIndex === correct ? 'correct' : 'incorrect';
    let feedbackText = selectedIndex === correct ? '✓ Correct!' : '✗ Incorrect';

    feedback.className = `quiz-feedback show ${feedbackClass}`;
    feedback.innerHTML = `
        <strong>${feedbackText}</strong><br>
        ${QUIZ_DATA.questions[questionIndex].explanation}
    `;

    question.classList.add('answered');
}

function submitQuiz() {
    let score = 0;
    let answered = 0;

    QUIZ_DATA.questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected) {
            answered++;
            if (parseInt(selected.value) === q.correct) {
                score++;
            }
        }
    });

    if (answered === 0) {
        alert('Please answer at least one question!');
        return;
    }

    const percentage = Math.round((score / QUIZ_DATA.questions.length) * 100);
    document.getElementById('score-percentage').textContent = percentage + '%';

    let message = '';
    if (percentage === 100) {
        message = '🎉 Perfect score! You\'ve mastered this material.';
    } else if (percentage >= 80) {
        message = '✓ Great job! You have a solid understanding.';
    } else if (percentage >= 60) {
        message = '→ Good effort! Review the material and try again.';
    } else {
        message = '← Review the key concepts and retake the quiz.';
    }

    document.getElementById('score-message').textContent = `You scored ${score}/${QUIZ_DATA.questions.length}. ${message}`;
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('quiz-results').classList.remove('hidden');
}

// Initialize quiz when page loads
document.addEventListener('DOMContentLoaded', initQuiz);
</script>
